# ============================================================
# Yuno CDE — Pre-commit Hooks
# Shift-left: catch issues before code leaves the developer's machine.
#
# Setup:
#   pip install pre-commit
#   pre-commit install
#   pre-commit run --all-files   # one-time check of existing code
#
# These hooks run in < 30 seconds for typical Terraform changes.
# ============================================================

repos:
  # ── Terraform formatting and validation ─────────────────────
  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: v1.96.1
    hooks:
      # Auto-format: fix style before commit
      - id: terraform_fmt

      # Validate syntax: catch HCL errors early
      - id: terraform_validate
        args:
          - --hook-config=--retry-once-with-cleanup=true

      # Generate documentation from module structure
      - id: terraform_docs
        args:
          - --hook-config=--create-if-not-exist=true

      # tflint: lint for best practices and provider-specific rules
      - id: terraform_tflint
        args:
          - --args=--config=__GIT_WORKING_DIR__/.tflint.hcl

      # tfsec: fast security scan — blocks on CRITICAL/HIGH
      - id: terraform_tfsec
        args:
          - --args=--minimum-severity HIGH

      # checkov: policy engine with custom CDE policies
      - id: terraform_checkov
        args:
          - --args=--hard-fail-on CRITICAL,HIGH
          - --args=--soft-fail-on MEDIUM,LOW
          - --args=--external-checks-dir policies/custom
          - --args=--compact
          - --args=--quiet

  # ── Secrets detection ───────────────────────────────────────
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  # ── General code quality ────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--allow-multiple-documents]
      - id: check-json
      - id: check-merge-conflict
      - id: detect-private-key    # Catch accidentally committed private keys
      - id: no-commit-to-branch   # Prevent direct commits to main
        args: [--branch, main, --branch, master]
