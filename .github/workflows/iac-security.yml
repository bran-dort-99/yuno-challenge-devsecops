# ============================================================
# Yuno CDE — IaC Security Scanning Pipeline
#
# Strategy: Fast feedback + defense in depth
#   Stage 1: terraform fmt + validate (< 30s) — immediate syntax catch
#   Stage 2: tfsec (< 1m) — fast, opinionated Terraform scanner
#   Stage 3: checkov (< 2m) — comprehensive policy engine with custom policies
#   Stage 4: trivy config (< 1m) — cross-tool verification
#
# Trade-off: CRITICAL/HIGH = block PR. MEDIUM = warn (visible, not blocking).
# This keeps pipeline under 5 minutes while catching real security issues.
#
# Total target: < 4 minutes for full scan pipeline.
# ============================================================

name: IaC Security Scan

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'terraform/**'
      - 'policies/**'
      - '.github/workflows/iac-security.yml'
  push:
    branches: [main]
    paths:
      - 'terraform/**'

permissions:
  contents: read
  pull-requests: write   # Post scan results as PR comments
  security-events: write # Upload SARIF results

env:
  TF_DIR: terraform
  CHECKOV_CUSTOM_POLICIES: policies/custom

jobs:
  # ── Stage 1: Format and Validate ────────────────────────────
  terraform-validate:
    name: "Stage 1: Format & Validate"
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.5.7"

      - name: Cache Terraform plugins
        uses: actions/cache@v4
        with:
          path: ~/.terraform.d/plugin-cache
          key: ${{ runner.os }}-terraform-${{ hashFiles('**/.terraform.lock.hcl') }}
          restore-keys: |
            ${{ runner.os }}-terraform-

      - name: Set Terraform Plugin Cache Dir
        run: |
          mkdir -p ~/.terraform.d/plugin-cache
          echo "TF_PLUGIN_CACHE_DIR=$HOME/.terraform.d/plugin-cache" >> $GITHUB_ENV

      - name: Terraform Format Check
        id: fmt
        run: terraform -chdir=${{ env.TF_DIR }} fmt -check -recursive -diff
        continue-on-error: true

      - name: Terraform Init (no backend)
        run: terraform -chdir=${{ env.TF_DIR }} init -backend=false

      - name: Terraform Validate
        run: terraform -chdir=${{ env.TF_DIR }} validate
      - name: Comment on format failure
        if: steps.fmt.outcome == 'failure' && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `### Terraform Format Check Failed\n\nRun \`terraform fmt -recursive\` locally to fix formatting.\n\nThis is a **blocking** check — unformatted code cannot be merged.`
            })

  # ── Stage 2: tfsec — Fast Terraform Security Scanner ────────
  tfsec:
    name: "Stage 2: tfsec Scan"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: terraform-validate

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run tfsec
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: ${{ env.TF_DIR }}
          format: sarif
          soft_fail: false  # Fail on CRITICAL and HIGH
          additional_args: "--out tfsec-results.sarif --minimum-severity HIGH"

      - name: Upload tfsec SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: tfsec-results.sarif
          category: tfsec

  # ── Stage 3: Checkov — Comprehensive Policy Engine ──────────
  checkov:
    name: "Stage 3: Checkov Scan"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: terraform-validate

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Checkov with Custom Policies
        id: checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: ${{ env.TF_DIR }}
          framework: terraform
          # Custom policies from policies/custom/
          external_checks_dirs: ${{ env.CHECKOV_CUSTOM_POLICIES }}
          # Fail on CRITICAL and HIGH severity
          hard_fail_on: CRITICAL,HIGH
          # Warn on MEDIUM — visible in output but non-blocking
          soft_fail_on: MEDIUM,LOW
          output_format: cli,sarif
          output_file_path: console,checkov-results.sarif
          # Skip checks that conflict with our architecture decisions
          # CKV_AWS_144: Cross-region replication (not needed for sa-east-1 single-region CDE)
          skip_check: CKV_AWS_144
          quiet: true
          compact: true

      - name: Upload Checkov SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: checkov-results.sarif
          category: checkov

  # ── Stage 4: Trivy — Cross-tool Verification ───────────────
  trivy:
    name: "Stage 4: Trivy Config Scan"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: terraform-validate

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy config scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          scan-ref: ${{ env.TF_DIR }}
          format: table
          exit-code: 1  # Fail on findings
          severity: CRITICAL,HIGH

      - name: Trivy SARIF output
        if: always()
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          scan-ref: ${{ env.TF_DIR }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH,MEDIUM

      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
          category: trivy

  # ── Stage 5: Secrets Scanning ───────────────────────────────
  secrets-scan:
    name: "Stage 5: Secrets Detection"
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Full history for git-based scanning

      - name: Run Gitleaks
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz \
            | sudo tar -xz -C /usr/local/bin gitleaks
          gitleaks detect --source . --no-git --verbose --redact

  # ── Summary Gate ────────────────────────────────────────────
  security-gate:
    name: "Security Gate"
    runs-on: ubuntu-latest
    needs: [terraform-validate, tfsec, checkov, trivy, secrets-scan]
    if: always()
    timeout-minutes: 5

    steps:
      - name: Check scan results
        run: |
          # SC2129: group all echoes into one redirect block
          {
            echo "## IaC Security Scan Summary"
            echo ""

            if [ "${{ needs.terraform-validate.result }}" == "failure" ]; then
              echo "- :x: **Terraform Validate**: FAILED"
            else
              echo "- :white_check_mark: **Terraform Validate**: PASSED"
            fi

            if [ "${{ needs.tfsec.result }}" == "failure" ]; then
              echo "- :x: **tfsec**: CRITICAL/HIGH findings detected"
            else
              echo "- :white_check_mark: **tfsec**: PASSED"
            fi

            if [ "${{ needs.checkov.result }}" == "failure" ]; then
              echo "- :x: **Checkov**: CRITICAL/HIGH findings detected"
            else
              echo "- :white_check_mark: **Checkov**: PASSED"
            fi

            if [ "${{ needs.trivy.result }}" == "failure" ]; then
              echo "- :x: **Trivy**: CRITICAL/HIGH findings detected"
            else
              echo "- :white_check_mark: **Trivy**: PASSED"
            fi

            if [ "${{ needs.secrets-scan.result }}" == "failure" ]; then
              echo "- :x: **Gitleaks**: Secrets detected!"
            else
              echo "- :white_check_mark: **Gitleaks**: No secrets found"
            fi

            echo ""
            echo "### Severity Policy"
            echo "| Severity | Action |"
            echo "|----------|--------|"
            echo "| CRITICAL | **Block merge** — must fix before deployment |"
            echo "| HIGH | **Block merge** — security risk too high for CDE |"
            echo "| MEDIUM | **Warn** — visible in PR, tracked for remediation |"
            echo "| LOW | **Info** — logged for awareness |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Enforce gate
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
        run: |
          echo "::error::Security gate FAILED. Fix CRITICAL/HIGH findings before merging."
          exit 1
